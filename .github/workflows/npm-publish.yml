name: Publish npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Publish version, for example 5.4.0 or v5.4.0"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish npm package
    runs-on: ubuntu-latest
    environment: npm publish

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Resolve publish version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            raw_version="${{ github.ref_name }}"
          else
            raw_version="${{ inputs.version }}"
          fi

          publish_version="${raw_version#v}"
          publish_tag="v${publish_version}"
          package_version="$(node -p "require('./package.json').version")"

          if [[ -z "${publish_version}" || "${publish_version}" == "v" ]]; then
            echo "Invalid version: ${raw_version}" >&2
            exit 1
          fi

          if [[ "${package_version}" != "${publish_version}" ]]; then
            echo "Version mismatch: package.json is ${package_version}, publish tag is ${publish_tag}" >&2
            exit 1
          fi

          {
            echo "PUBLISH_VERSION=${publish_version}"
            echo "PUBLISH_TAG=${publish_tag}"
          } >> "${GITHUB_ENV}"

      - name: Check npm version availability
        id: npm_version
        shell: bash
        run: |
          set +e
          npm view "cartridge-system@${PUBLISH_VERSION}" version --json > npm-version.json 2> npm-view-error.log
          status=$?
          set -e

          if [[ "${status}" -eq 0 ]]; then
            echo "already_published=true" >> "${GITHUB_OUTPUT}"
            echo "cartridge-system@${PUBLISH_VERSION} already exists. Skipping npm publish."
            exit 0
          fi

          if grep -q "E404" npm-view-error.log; then
            echo "already_published=false" >> "${GITHUB_OUTPUT}"
            echo "cartridge-system@${PUBLISH_VERSION} is not published yet."
            exit 0
          fi

          cat npm-view-error.log >&2
          exit "${status}"

      - name: Install dependencies
        if: steps.npm_version.outputs.already_published != 'true'
        run: npm ci

      - name: Run lint
        if: steps.npm_version.outputs.already_published != 'true'
        run: npm run lint

      - name: Run tests
        if: steps.npm_version.outputs.already_published != 'true'
        run: npm test

      - name: Build
        if: steps.npm_version.outputs.already_published != 'true'
        run: npm run build

      - name: Type check
        if: steps.npm_version.outputs.already_published != 'true'
        run: npx tsc --noEmit

      - name: Pack dry-run
        if: steps.npm_version.outputs.already_published != 'true'
        run: npm pack --dry-run --json

      - name: Publish to npm
        if: steps.npm_version.outputs.already_published != 'true'
        run: npm publish
