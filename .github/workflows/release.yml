name: Release VSIX

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 5.1.1 or v5.1.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and publish VSIX
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve release version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            raw_version="${{ github.ref_name }}"
          else
            raw_version="${{ inputs.version }}"
          fi

          release_version="${raw_version#v}"
          release_tag="v${release_version}"
          package_version="$(node -p "require('./package.json').version")"

          if [[ -z "${release_version}" || "${release_version}" == "${raw_version}" && "${raw_version}" == v ]]; then
            echo "Invalid version: ${raw_version}" >&2
            exit 1
          fi

          if [[ "${package_version}" != "${release_version}" ]]; then
            echo "Version mismatch: package.json is ${package_version}, release tag is ${release_tag}" >&2
            exit 1
          fi

          {
            echo "RELEASE_VERSION=${release_version}"
            echo "RELEASE_TAG=${release_tag}"
            echo "RELEASE_TITLE=Cartridge System ${release_tag}"
          } >> "${GITHUB_ENV}"

      - name: Run tests
        run: npm test

      - name: Run lint
        run: npm run lint

      - name: Build extension
        run: npm run build

      - name: Package VSIX
        run: npm run package

      - name: Prepare release notes
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const version = process.env.RELEASE_VERSION;
          const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
          const lines = changelog.split(/\r?\n/);
          const headingPattern = new RegExp(`^##\\s+(?:\\[v?${version.replace(/\./g, '\\.')}\\]|v?${version.replace(/\./g, '\\.')})(?:\\s|$)`);

          const start = lines.findIndex((line) => headingPattern.test(line));
          let body = '';

          if (start >= 0) {
            let end = lines.length;
            for (let index = start + 1; index < lines.length; index += 1) {
              if (/^##\s+/.test(lines[index])) {
                end = index;
                break;
              }
            }
            body = lines.slice(start, end).join('\n').trim();
          }

          if (!body) {
            body = [
              `# Cartridge System v${version}`,
              '',
              `此版本未在 CHANGELOG.md 找到 v${version} 對應段落。`,
              '',
              '請下載下方 VSIX 附件，並使用 VS Code / Antigravity 的 Install from VSIX 安裝。'
            ].join('\n');
          }

          fs.writeFileSync('RELEASE_NOTES.md', `${body}\n`, 'utf8');
          NODE

      - name: Locate VSIX
        shell: bash
        run: |
          shopt -s nullglob
          files=(cartridge-system-*.vsix)

          if [[ "${#files[@]}" -ne 1 ]]; then
            echo "Expected exactly one cartridge-system-*.vsix file, found ${#files[@]}." >&2
            printf '%s\n' "${files[@]}" >&2
            exit 1
          fi

          echo "VSIX_PATH=${files[0]}" >> "${GITHUB_ENV}"

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --title "${RELEASE_TITLE}" \
              --notes-file RELEASE_NOTES.md \
              --latest
            gh release upload "${RELEASE_TAG}" "${VSIX_PATH}" --clobber
          else
            gh release create "${RELEASE_TAG}" "${VSIX_PATH}" \
              --title "${RELEASE_TITLE}" \
              --notes-file RELEASE_NOTES.md \
              --target "${GITHUB_SHA}" \
              --latest
          fi
